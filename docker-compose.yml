services:
  # ── 数据库 ──────────────────────────────────────────────
  mysql-db:
    image: mysql:8.0
    container_name: event_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: event_platform
    ports:
      - "3307:3306"
    volumes:
      # 持久化数据
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  # ── 后端 Node.js ─────────────────────────────────────────
  node-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: event_backend
    restart: always
    depends_on:
      mysql-db:
        condition: service_healthy  # 等 MySQL 完全就绪再启动
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql-db:3306/event_platform
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      ADMIN_INIT_PASSWORD: ${ADMIN_INIT_PASSWORD:-Admin@123456}
    ports:
      - "3000:3000"
    volumes:
      # 共享上传目录（容器内 /app/uploads → 宿主机 ./uploads）
      - ./uploads:/app/uploads
    networks:
      - backend

  # ── 前端 Vue 静态资源 ───────────────────────────────────
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: event_nginx
    restart: always
    depends_on:
      - node-app
    ports:
      - "8080:80"
    volumes:
      # Nginx 配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
