server {
    listen 80;
    server_name _;

    # CSP: 允许 eval（wangEditor v4 依赖），覆盖后端 helmet 的 CSP
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none';" always;

    # 前端静态文件
    root /usr/share/nginx/html;
    index index.html;

    # 前端路由（Vue Router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://node-app:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # 隐藏后端 helmet 的 CSP，由 nginx 统一控制
        proxy_hide_header Content-Security-Policy;
    }

    # 上传文件（后端写入 /app/uploads，nginx 透传访问）
    # ^~ 确保优先于下方的正则缓存块，否则 .png/.jpg 会被缓存块截获返回 404
    location ^~ /uploads/ {
        proxy_pass http://node-app:3000/uploads/;
        proxy_set_header Host $host;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}
